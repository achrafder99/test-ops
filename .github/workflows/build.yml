name: CI/CD - Build, Push, Update Manifest

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set version
        run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t achrafdardour/simple-app:${VERSION} ./simple-app

      - name: Push Docker image
        run: |
          docker push achrafdardour/simple-app:${VERSION}

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: achrafdardour/simple-app:${VERSION}|" k8s/deployment.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/deployment.yaml
          git commit -m "update image to ${VERSION}" || echo "no changes"

          git push origin main
